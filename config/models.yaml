# ── config/models.yaml ──
defaults:
  temperature: 0.7
  max_tokens: 512

roles:
  execute:
    temperature: 0.7
    max_tokens: 512
  critique:
    temperature: 0.4
    max_tokens: 300
  refine:
    temperature: 0.7
    max_tokens: 512
  review:
    temperature: 0.3
    max_tokens: 300
  reflect:
    temperature: 0.7
    max_tokens: 900

default_pipeline:
  execute: codex_cli
  critique: claude_code
  refine: codex_cli
  review: claude_code
  reflect: claude_code

providers:
  # ===== CLI AGENTS (first-class) =====
  codex_cli:
    type: cli
    class_path: anvil.providers.codex_cli.CodexCliProvider
    binary: codex
    model_name: gpt-5-codex
    default_args: []
    env: {}
    models:
      gpt-5-codex/*:
        execute:
          access: read
          effort: medium
          timeout_sec: 300
        critique:
          access: read
          effort: high
          timeout_sec: 300
        refine:
          access: read
          effort: high
          timeout_sec: 300
        review:
          access: read
          effort: medium
          timeout_sec: 300
        reflect:
          access: read
          effort: high
          timeout_sec: 300

  claude_code:
    type: cli
    class_path: anvil.providers.claude_code.ClaudeCodeProvider
    binary: claude
    # Claude Code can authenticate via Claude subscription, Console/API key,
    # or other configured auth; keep key_env optional by default.
    model_name: sonnet
    default_args: []
    env: {}
    models:
      sonnet/*:
        execute:
          access: read
          effort: medium
          timeout_sec: 300
          max_turns: 4
        critique:
          access: read
          effort: high
          timeout_sec: 300
          max_turns: 4
        refine:
          access: read
          effort: high
          timeout_sec: 300
          max_turns: 4
        review:
          access: read
          effort: medium
          timeout_sec: 300
          max_turns: 3
        reflect:
          access: read
          effort: high
          timeout_sec: 300
          max_turns: 4

  # ===== API BACKENDS =====
  anthropic:
    type: api
    class_path: anvil.providers.anthropic.AnthropicProvider
    key_env: ANTHROPIC_API_KEY
    model_name: claude-3-haiku-20240307
    models:
      claude-3-haiku-20240307/*:
        execute:
          temperature: 0.7
          max_tokens: 512
        critique:
          temperature: 0.4
          max_tokens: 300
        refine:
          temperature: 0.7
          max_tokens: 512
        review:
          temperature: 0.3
          max_tokens: 300
        reflect:
          temperature: 0.7
          max_tokens: 900
      claude-3-sonnet-20240229/*:
        execute:
          temperature: 0.7
          max_tokens: 1024
        critique:
          temperature: 0.4
          max_tokens: 512
        refine:
          temperature: 0.7
          max_tokens: 1024
        review:
          temperature: 0.3
          max_tokens: 512
        reflect:
          temperature: 0.7
          max_tokens: 1500

  openai:
    type: api
    class_path: anvil.providers.openai.OpenAIProvider
    key_env: OPENAI_API_KEY
    model_name: gpt-4o-mini
    models:
      gpt-4o-mini/*:
        execute:
          temperature: 0.7
          max_tokens: 512
        critique:
          temperature: 0.4
          max_tokens: 300
        refine:
          temperature: 0.7
          max_tokens: 512
        review:
          temperature: 0.3
          max_tokens: 300
        reflect:
          temperature: 0.7
          max_tokens: 900

  # ===== LOCAL BACKENDS =====
  phi3-mini:
    type: local
    framework: transformers
    class_path: anvil.providers.huggingface.HuggingFaceProvider
    model_name: models/hf/Phi-3-mini-4k-instruct
    device: mps
    models:
      default/*:
        execute:
          temperature: 0.7
          max_tokens: 512
        critique:
          temperature: 0.4
          max_tokens: 300
        refine:
          temperature: 0.7
          max_tokens: 512
        review:
          temperature: 0.3
          max_tokens: 300
        reflect:
          temperature: 0.7
          max_tokens: 900

  qwen3-gguf:
    type: local
    framework: llama_cpp
    class_path: anvil.providers.llama_cpp.LlamaCppProvider
    model_path: models/gguf/Qwen3-0.6B-Code-Expert.Q8_0.gguf
    models:
      default/*:
        execute:
          temperature: 0.7
          max_tokens: 1800
        critique:
          temperature: 0.4
          max_tokens: 1024
        refine:
          temperature: 0.7
          max_tokens: 1800
        review:
          temperature: 0.3
          max_tokens: 512
        reflect:
          temperature: 0.7
          max_tokens: 512
