name: analysis-review-codex-claude
kind: analysis_review_v1
prompt_preamble: |
  You are operating inside Forge's mini-harness surface.
  Keep recommendations concrete, grounded, and scoped to the task.
roles:
  proposer:
    provider: codex_cli
    effort: medium
    access: read
    timeout_sec: 1800
  critic:
    provider: claude_code
    effort: high
    access: read
    timeout_sec: 1200
    disable_bare: true
  reviser:
    provider: codex_cli
    effort: high
    access: read
    timeout_sec: 1800
  auditor:
    provider: claude_code
    effort: high
    access: read
    timeout_sec: 1200
    disable_bare: true
review_loops:
  min_loops: 1
  max_loops: 3
  always_run_first_revision: true
  stop_when:
    max_open_medium_issues: 0
    min_grounding_score: 0.8
    min_actionability_score: 0.75
    min_scope_compliance_score: 0.85
validators: []
