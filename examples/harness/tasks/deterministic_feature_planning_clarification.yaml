id: deterministic_feature_planning_clarification
task_kind: planning
objective: >
  Produce a deterministic execution plan for the C2 measurable coverage ledger
  and assumptions register proof, but stop when the planning package needs
  clarification.
workspace_write_policy:
  mode: forbid
  allowed_paths: []
  denied_paths: []
  allow_untracked: false
  allow_renames: false
  allow_deletions: false
  max_touched_files: 0
  require_clean_start: false
acceptance:
  - Emit the clarification_needed terminal status.
  - Return at least one clarification request.
  - Publish summary.json only with truthful partial coverage payloads.
constraints:
  - Keep the planning package bounded to the C2 measurable coverage proof.
  - Do not modify repository files.
context: |
  Use the repository state in the target workspace as the planning context.
  This fixture exercises the honest clarification stop path.
files_hint:
  - PLAN.md
  - anvil/harness/*
notes: |
  planning_fixture_mode=clarification_needed
  This is an explicit fixture-only clarification stop path for the bounded C2
  planning surface; it publishes summary.json only with truthful partial
  coverage_status, coverage_ledger, assumptions_register, and uncovered_delta
  payloads.
