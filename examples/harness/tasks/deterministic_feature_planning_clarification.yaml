id: deterministic_feature_planning_clarification
task_kind: planning
objective: >
  Produce a deterministic execution plan for the C1 planning compiler wedge,
  but stop when the planning package needs clarification.
workspace_write_policy:
  mode: forbid
  allowed_paths: []
  denied_paths: []
  allow_untracked: false
  allow_renames: false
  allow_deletions: false
  max_touched_files: 0
  require_clean_start: false
acceptance:
  - Emit the clarification_needed terminal status.
  - Return at least one clarification request.
  - Do not publish plan artifacts.
constraints:
  - Keep the planning package bounded to the C1 deterministic planning wedge.
  - Do not modify repository files.
context: |
  Use the repository state in the target workspace as the planning context.
  This fixture exercises the honest clarification stop path.
files_hint:
  - PLAN.md
  - anvil/harness/*
notes: |
  planning_fixture_mode=clarification_needed
  This is an explicit fixture-only clarification stop path for the bounded planning
  surface; it does not imply a broader planning capability.
