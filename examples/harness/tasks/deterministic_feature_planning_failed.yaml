id: deterministic_feature_planning_failed
task_kind: planning
objective: >
  Produce a deterministic execution plan for the C2 measurable coverage ledger
  and assumptions register proof, but stop with an explicit planning failure.
workspace_write_policy:
  mode: forbid
  allowed_paths: []
  denied_paths: []
  allow_untracked: false
  allow_renames: false
  allow_deletions: false
  max_touched_files: 0
  require_clean_start: false
acceptance:
  - Emit the failed terminal status.
  - Return an explicit planning_stop_reason.
  - Publish summary.json only with truthful coverage payloads.
constraints:
  - Keep the planning package bounded to the C2 measurable coverage proof.
  - Do not modify repository files.
context: |
  Use the repository state in the target workspace as the planning context.
  This fixture exercises the honest failed stop path.
files_hint:
  - PLAN.md
  - anvil/harness/*
notes: |
  planning_fixture_mode=failed
  This is an explicit fixture-only failed stop path for the bounded C2 planning
  surface; it publishes summary.json only with truthful coverage_status,
  coverage_ledger, assumptions_register, and uncovered_delta payloads.
