id: deterministic_feature_planning_success
task_kind: planning
objective: >
  Produce a deterministic execution plan for the C2 measurable coverage ledger
  and assumptions register proof using the shared planning runtime.
workspace_write_policy:
  mode: forbid
  allowed_paths: []
  denied_paths: []
  allow_untracked: false
  allow_renames: false
  allow_deletions: false
  max_touched_files: 0
  require_clean_start: false
acceptance:
  - Emit a successful planning terminal payload.
  - Produce deterministic seam, workstream, and slice identifiers.
  - Publish PLAN.md and plan.json with coverage, assumptions, and uncovered delta.
constraints:
  - Keep the planning package bounded to the C2 measurable coverage proof.
  - Do not modify repository files.
context: |
  Use the repository state in the target workspace as the planning context.
  This fixture exercises the shared planning runtime and artifact publication path.
files_hint:
  - PLAN.md
  - anvil/harness/*
notes: |
  This fixture should complete successfully from live workspace evidence and publish
  deterministic planning artifacts with C2 coverage truth in PLAN.md and plan.json.
  It is intentionally bounded to one existing repo and does not use planning_fixture_mode.
